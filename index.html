<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Ejercicio · Perfil dinámico</title>
</head>
<body>
  <section>
    <!-- Ejercicio 1 -->
    <h1>Perfil de usuario dinámico</h1>
    <!-- Contenedor vacío para la tarjeta -->
    <div id="perfil-container"></div>
    <br>
  </section>

  <section>
    <!-- Ejercicio 2 -->
    <h1>Galería de colores interactiva</h1>

    <div id="color-panel">
      <input id="color-picker" type="color" value="#c8952a">
      <input id="color-text" type="text" placeholder="#c8952a">
    </div>

    <div id="color-preview"></div>

    <p id="color-info">
      <span id="color-hex"></span>
      <span id="color-name"></span>
    </p>

    <p id="color-error"></p>
  </section>

  <section>
    <!-- Ejercicio 3 -->
    <h1>Lista de tareas</h1>

    <div id="todo-panel">
    <input id="todo-input" type="text" placeholder="Nueva tarea...">
    <button id="todo-add">Agregar</button>
    </div>

    <p>Tareas pendientes: <span id="todo-count">0</span></p>

    <ul id="todo-list"></ul>

    <p id="todo-error"></p>
  </section>

  <section>
  <!-- Ejercicio 4 -->
  <h1>Registro</h1>

    <form id="registro-form">
      <div>
        <label for="usuario">Nombre de usuario</label>
        <input id="usuario" type="text">
      </div>

      <div>
        <label for="email">Email</label>
        <input id="email" type="email">
      </div>

      <div>
        <label for="password">Contraseña</label>
        <input id="password" type="password">
      </div>

      <div>
        <label for="confirmar">Confirmar contraseña</label>
        <input id="confirmar" type="password">
      </div>

      <button id="btn-enviar" type="submit">Enviar</button>
    </form>

    <div id="registro-exito"></div>
  </section>

  <script type="module" src="main.js"></script>
</body>
</html>
